<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      window.location.replace(
        '/?p=' + encodeURIComponent(path) +
        window.location.search.replace('?', '&') +
        window.location.hash
      );
    </script>
  </head>
</html>
