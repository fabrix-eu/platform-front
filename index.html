<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabrix Platform</title>
    <script>
      var _paq = window._paq = window._paq || [];
      _paq.push(['enableLinkTracking']);
      (function() {
        var u="https://stats.daysplit.com/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '3']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA redirect from 404.html
      (function () {
        var m = window.location.search.match(/[?&]p=([^&]+)/);
        if (m) {
          var path = decodeURIComponent(m[1]);
          var rest = window.location.search.replace(/[?&]p=[^&]+/, '').replace(/^&/, '?');
          window.history.replaceState(null, '', path + rest + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
